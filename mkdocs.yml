site_name: PraisonAIBio
site_description: AI agents for systems biology — BioModels.org discovery, simulation, and comparison
site_url: https://bio.praison.ai/
repo_url: https://github.com/MervinPraison/PraisonAIBio
repo_name: MervinPraison/PraisonAIBio
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/favicon.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: bio-light
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: bio-dark
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: bio-light
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: bio-dark
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - header.autohide

plugins:
  - search:
      separator: '[\s\-]+'

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MervinPraison/PraisonAIBio
    - icon: fontawesome/solid/dna
      link: https://www.biomodels.org
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascript/extra.js

nav:
  - Home: index.md
  - Get started:
      - get-started/index.md
      - Install: install.md
      - Quick tasks: quick-tasks.md
      - Interactive guide: interactive-guide.md
      - For researchers: for-researchers.md
      - FAQ: faq.md
  - Examples:
      - examples/index.md
      - Minimal (2 lines): examples/minimal/index.md
      - Small examples:
          - examples/small/index.md
          - "01 — Search": examples/small/01-search.md
          - "02 — Model info": examples/small/02-model-info.md
          - "03 — Trust score": examples/small/03-trust-score.md
          - "04 — Validate SBML": examples/small/04-validate-sbml.md
          - "05 — Simulate": examples/small/05-simulate.md
          - "06 — Perturb": examples/small/06-perturb.md
          - "07 — Compare models": examples/small/07-compare-models.md
          - "08 — Compare sims": examples/small/08-compare-sims.md
          - "09 — Repro export": examples/small/09-repro-export.md
          - "10 — SBML graph": examples/small/10-sbml-graph.md
      - Agent examples:
          - examples/big/index.md
          - "01 — Find models": examples/big/01-find-models.md
          - "02 — Summarise": examples/big/02-summarise-model.md
          - "03 — Discovery": examples/big/03-discovery-study.md
          - "04 — Glycolysis": examples/big/04-glycolysis-demo.md
          - "05 — Perturb compare": examples/big/05-perturb-compare.md
          - "06 — Full repro": examples/big/06-full-repro-study.md
          - "07 — Agent configs": examples/big/07-agent-with-configs.md
      - Notebooks: examples/notebooks/index.md
  - Tools:
      - tools-at-a-glance.md
      - tools-reference.md
      - toolsets.md
      - skills.md
      - cli.md
      - MCP: concepts/mcp.md
  - Workflows:
      - concepts/workflows.md
      - concepts/scientist-workflow.md
      - recipes.md
  - Concepts:
      - Backbone: concepts/praisonai-backbone.md
      - Policy: concepts/policy.md
      - HITL: concepts/hitl.md
      - Session: concepts/session.md
      - Graph: concepts/graph.md
      - MCP: concepts/mcp.md
  - Compare:
      - concepts/vs-t2b.md
      - concepts/vs-clawbio.md
  - Development:
      - development.md
      - plan-validation.md
      - custom-domain.md
