site_name: PraisonAIBio
site_description: AI agents for systems biology — BioModels.org discovery, simulation, and comparison
site_url: https://bio.praison.ai/
repo_url: https://github.com/MervinPraison/PraisonAIBio
repo_name: MervinPraison/PraisonAIBio
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: red
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: red
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Get started:
      - Overview: get-started.md
      - Install: install.md
      - Quick tasks: quick-tasks.md
      - For researchers: for-researchers.md
      - FAQ: faq.md
  - Guides:
      - Examples:
          - Overview: examples/index.md
          - Small — Search: examples/small/01-search.md
          - Small — Model info: examples/small/02-model-info.md
          - Small — Trust score: examples/small/03-trust-score.md
          - Small — Validate SBML: examples/small/04-validate-sbml.md
          - Agent — Find models: examples/big/01-find-models.md
          - Agent — Summarise: examples/big/02-summarise-model.md
          - Agent — Discovery: examples/big/03-discovery-study.md
          - Agent — Glycolysis: examples/big/04-glycolysis-demo.md
      - Workflows: concepts/workflows.md
      - Toolsets: toolsets.md
      - Tools: tools-at-a-glance.md
      - Tools reference: tools-reference.md
      - Recipes: recipes.md
      - Skills: skills.md
      - CLI: cli.md
      - MCP: concepts/mcp.md
  - Compare:
      - vs Talk2BioModels: concepts/vs-t2b.md
      - vs ClawBio: concepts/vs-clawbio.md
  - Development:
      - Testing: development.md
      - Custom domain: custom-domain.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MervinPraison/PraisonAIBio
