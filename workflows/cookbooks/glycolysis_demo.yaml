# Glycolysis demo — BIOMD0000000206 (Teusink 2000)
# Run: praisonai workflow run workflows/cookbooks/glycolysis_demo.yaml

framework: praisonai
process: workflow

config:
  llm: gpt-4o-mini

agents:
  scout:
    role: BioModels Scout
    instructions: Locate the Teusink glycolysis model on BioModels.org.
    toolsets:
      - biomodels-readonly

  analyst:
    role: SBML Analyst
    instructions: Summarise the glycolysis model structure.
    toolsets:
      - sbml_analysis

  simulator:
    role: Simulation Engineer
    instructions: Run a baseline simulation of BIOMD0000000206.
    toolsets:
      - simulation

steps:
  - agent: scout
    action: Search for BIOMD0000000206 or Teusink glycolysis model. Return model ID and metadata summary.

  - agent: analyst
    action: Summarise species and reactions for BIOMD0000000206.

  - agent: simulator
    action: Run a 100 time-unit simulation of BIOMD0000000206 and summarise dynamics.
