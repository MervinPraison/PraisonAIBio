# MAPK/p53 discovery cookbook
framework: praisonai
process: workflow

config:
  llm: gpt-4o-mini

agents:
  scout:
    role: BioModels Scout
    instructions: Discover MAPK and p53 pathway models.
    toolsets:
      - biomodels-readonly

  reviewer:
    role: Curation Reviewer
    instructions: Score trust for shortlisted models.
    toolsets:
      - biomodels-readonly

steps:
  - agent: scout
    action: Search BioModels for MAPK and p53 curated models. Return a ranked shortlist with model IDs.

  - agent: reviewer
    action: Produce trust scorecards for the top 3 models from the shortlist with publication links.
