framework: praisonai
process: workflow
input: "{{ question }}"
variables:
  question: "Gadkar stage 6 — systems biology model development"
  run_id: "gadkar-stage-6"
config:
  llm: gpt-4o-mini
agents:
  lead:
    role: Support experiments and FAIR export
    instructions: Execute Gadkar stage 6 with BioModels tools.
    toolsets: [repro, reporting]
steps:
  - agent: lead
    action: "Stage 6: {{ question }}. Persist artefacts under run_id {{ run_id }}."
