framework: praisonai
process: workflow
input: "{{ question }}"
variables:
  question: "Gadkar stage 5 — systems biology model development"
  run_id: "gadkar-stage-5"
config:
  llm: gpt-4o-mini
agents:
  lead:
    role: Explore variability
    instructions: Execute Gadkar stage 5 with BioModels tools.
    toolsets: [simulation]
steps:
  - agent: lead
    action: "Stage 5: {{ question }}. Persist artefacts under run_id {{ run_id }}."
