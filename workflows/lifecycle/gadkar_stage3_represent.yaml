framework: praisonai
process: workflow
input: "{{ question }}"
variables:
  question: "Gadkar stage 3 — systems biology model development"
  run_id: "gadkar-stage-3"
config:
  llm: gpt-4o-mini
agents:
  lead:
    role: Represent biology in SBML
    instructions: Execute Gadkar stage 3 with BioModels tools.
    toolsets: [sbml_analysis]
steps:
  - agent: lead
    action: "Stage 3: {{ question }}. Persist artefacts under run_id {{ run_id }}."
