framework: praisonai
process: workflow
input: "{{ question }}"
variables:
  question: "Gadkar stage 4 — systems biology model development"
  run_id: "gadkar-stage-4"
config:
  llm: gpt-4o-mini
agents:
  lead:
    role: Calibrate and simulate
    instructions: Execute Gadkar stage 4 with BioModels tools.
    toolsets: [simulation]
steps:
  - agent: lead
    action: "Stage 4: {{ question }}. Persist artefacts under run_id {{ run_id }}."
