framework: praisonai
process: workflow
input: "HITL approval before simulation for BIOMD0000000206"

variables:
  model_id: BIOMD0000000206

config:
  llm: gpt-4o-mini

agents:
  analyst:
    role: SBML Analyst
    instructions: Review assumptions for the selected BioModels ID.
    toolsets: [sbml_analysis]
  engineer:
    role: Simulation Engineer
    instructions: Run baseline simulation after approval.
    toolsets: [simulation]

steps:
  - agent: analyst
    action: "Summarise assumptions for {{ model_id }} and list HITL flags."

  - name: approve_assumptions
    approve:
      description: Approve assumption review before running simulation
      risk_level: medium
      auto_approve: false

  - agent: engineer
    action: "Simulate {{ model_id }} for 50 time units after approval."
