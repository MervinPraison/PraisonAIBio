framework: praisonai
process: workflow
input: "HITL gate before parameter scan on BIOMD0000000206"

variables:
  model_id: BIOMD0000000206

config:
  llm: gpt-4o-mini

agents:
  designer:
    role: Perturbation Designer
    instructions: Propose parameter scan ranges.
    toolsets: [sysbio-safe]
  engineer:
    role: Simulation Engineer
    instructions: Run approved parameter scan.
    toolsets: [simulation]

steps:
  - agent: designer
    action: "Design a scan for {{ model_id }} parameter v1 from 0.1 to 2.0."

  - name: approve_scan
    approve:
      description: Approve parameter scan plan before execution
      risk_level: medium
      auto_approve: false

  - agent: engineer
    action: "Execute approved parameter scan on {{ model_id }}."
