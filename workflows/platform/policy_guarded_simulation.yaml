framework: praisonai
process: workflow
input: "Policy-guarded simulation for BIOMD0000000206"

variables:
  model_id: BIOMD0000000206
  policy: bio-lab

env:
  PRAISONAI_POLICY_PACK: bio-lab

config:
  llm: gpt-4o-mini

agents:
  validator:
    role: SBML Validator
    toolsets: [sbml_analysis]
  engineer:
    role: Simulation Engineer
    toolsets: [simulation]

steps:
  - agent: validator
    action: "Validate SBML for {{ model_id }} under policy {{ policy }} (set PRAISONAI_POLICY_PACK=bio-lab)."

  - agent: engineer
    action: "Run baseline simulation for {{ model_id }} for 50 time units."
