type: job
name: eval-regression-gate
description: Run T2B parity scorer and pass/fail gate

steps:
  - name: Run scorer
    run: python benchmarks/t2b_parity/scorer.py

  - name: Judge results
    judge:
      input_file: benchmarks/t2b_parity/manifest.json
      criteria: |
        - All 10 T2B tool cases defined
        - Scorer runs without error
      threshold: 7.0
      on_fail: warn
      model: gpt-4o-mini
