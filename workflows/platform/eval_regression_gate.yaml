framework: praisonai
process: workflow
input: "T2B parity regression gate"

config:
  llm: gpt-4o-mini

agents:
  evaluator:
    role: Benchmark Evaluator
    instructions: Validate deterministic T2B tool-routing parity.
    toolsets: [sysbio-safe]

steps:
  - agent: evaluator
    action: |
      CI must run: python benchmarks/t2b_parity/eval_suite_runner.py
      Pass criteria: mean_score >= 0.9 across all T2B parity cases.
      Also run: python benchmarks/run_all.py for simulation RMSE check.
