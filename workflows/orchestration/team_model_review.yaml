framework: praisonai
process: workflow

config:
  llm: gpt-4o-mini

agents:
  modeller:
    role: Modeller
    instructions: Load and summarise SBML models.
    toolsets: [sbml_analysis]

  reviewer:
    role: Reviewer
    instructions: Policy-check assumptions before simulation.
    toolsets: [sysbio-safe]

  reporter:
    role: Reporter
    instructions: Export reproducibility bundle.
    toolsets: [repro]

steps:
  - agent: modeller
    action: Summarise BIOMD0000000206 structure — species, reactions, compartments.

  - agent: reviewer
    action: Trust scorecard and assumption flags for BIOMD0000000206.

  - agent: reporter
    action: Export repro bundle for BIOMD0000000206 to /tmp/glycolysis_repro.
