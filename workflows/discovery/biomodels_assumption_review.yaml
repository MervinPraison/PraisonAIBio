framework: praisonai
process: workflow
input: "Assumption review with HITL gate for BIOMD0000000206"

variables:
  model_id: BIOMD0000000206

config:
  llm: gpt-4o-mini

agents:
  analyst:
    role: SBML Analyst
    instructions: Review assumptions, units, and boundary conditions.
    toolsets: [sbml_analysis]

steps:
  - agent: analyst
    action: "Review assumptions for {{ model_id }} using sbml_summarise and sbml_validate."

  - name: hitl_approve_assumptions
    approve:
      description: Human approval required before simulation
      risk_level: high
      auto_approve: false

  - agent: analyst
    action: "Confirm assumptions approved — hand off to baseline simulation workflow."
